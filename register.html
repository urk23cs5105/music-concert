<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        .error {
            color: red;
            font-size: 14px;
        }

        .success {
            color: green;
            font-size: 16px;
        }

        input {
            display: block;
            margin-bottom: 10px;
            padding: 5px;
        }
    </style>
</head>

<body>

<h2>Event Registration Form</h2>

<form id="regForm">

    Participant Name:
    <input type="text" id="name">
    <span class="error" id="nameError"></span>

    Email:
    <input type="text" id="email">
    <span class="error" id="emailError"></span>

    Event Name:
    <input type="text" id="eventName" readonly>

    Mobile Number:
    <input type="text" id="mobile">
    <span class="error" id="mobileError"></span>

    <br>

    <button type="button" id="submitBtn">Submit</button>
    <button type="button" id="resetBtn">Reset</button>

</form>

<p id="message"></p>

<script>
$(document).ready(function(){

    // Get event name from URL
    let params = new URLSearchParams(window.location.search);
    let event = params.get("event");
    $("#eventName").val(event);

    // Submit Button
    $("#submitBtn").click(function(){

        // Get values
        let name = $("#name").val();
        let email = $("#email").val();
        let mobile = $("#mobile").val();

        let isValid = true;

        // Clear old messages
        $(".error").text("");
        $("input").css("border", "");
        $("#message").text("");

        // Name Validation
        if(name == ""){
            $("#nameError").text("Name is required");
            $("#name").css("border", "2px solid red");
            isValid = false;
        }

        // Email Validation
        let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(email == ""){
            $("#emailError").text("Email is required");
            $("#email").css("border", "2px solid red");
            isValid = false;
        } 
        else if(!emailPattern.test(email)){
            $("#emailError").text("Invalid Email format");
            $("#email").css("border", "2px solid red");
            isValid = false;
        }

        // Mobile Validation
        let mobilePattern = /^[0-9]{10,}$/;
        if(mobile == ""){
            $("#mobileError").text("Mobile number is required");
            $("#mobile").css("border", "2px solid red");
            isValid = false;
        } 
        else if(!mobilePattern.test(mobile)){
            $("#mobileError").text("Enter valid mobile number (min 10 digits)");
            $("#mobile").css("border", "2px solid red");
            isValid = false;
        }

        // If all valid
        if(isValid){
            $("#message")
                .text("Registration Successful for " + name)
                .removeClass()
                .addClass("success");

            // Disable button
            $("#submitBtn")
                .prop("disabled", true)
                .text("Registered");
        }

    });

    // Reset Button
    $("#resetBtn").click(function(){

        $("#regForm")[0].reset(); // clear form

        $(".error").text("");    // remove errors
        $("#message").text("");  // remove success message

        $("input").css("border", "");

        // Enable submit again
        $("#submitBtn")
            .prop("disabled", false)
            .text("Submit");
    });

});
</script>

</body>
</html>
